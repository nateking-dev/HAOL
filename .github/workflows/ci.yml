name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Install Dolt
        run: |
          sudo bash -c 'curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | bash'

      - name: Start Dolt SQL server
        working-directory: /tmp
        run: |
          dolt config --global --add user.email "ci@haol.dev"
          dolt config --global --add user.name "HAOL CI"
          mkdir -p haol-db && cd haol-db
          dolt init
          dolt sql-server --host 0.0.0.0 --port 3306 --user root --no-auto-commit &
          for i in $(seq 1 30); do
            mysql -h 127.0.0.1 -P 3306 -u root -e "SELECT 1" 2>/dev/null && break
            sleep 1
          done
          mysql -h 127.0.0.1 -P 3306 -u root -e "CREATE DATABASE IF NOT EXISTS haol"

      - name: Run migrations and seed
        run: |
          npm run migrate
          npm run seed
        env:
          DOLT_HOST: 127.0.0.1
          DOLT_PORT: 3306
          DOLT_USER: root
          DOLT_PASSWORD: ""
          DOLT_DATABASE: haol

      - name: Test
        run: npm run test
        env:
          DOLT_HOST: 127.0.0.1
          DOLT_PORT: 3306
          DOLT_USER: root
          DOLT_PASSWORD: ""
          DOLT_DATABASE: haol
